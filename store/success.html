<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GamerLingo Pro — Welcome!</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0f23, #1a1a3e);
      font-family: 'Segoe UI', -apple-system, Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }
    .card {
      text-align: center;
      max-width: 420px;
      padding: 48px 32px;
    }
    .icon { font-size: 64px; margin-bottom: 16px; }
    h1 { font-size: 28px; color: #6c63ff; margin-bottom: 8px; }
    p { color: #b8b8d0; line-height: 1.6; margin-bottom: 24px; }
    .hint {
      background: rgba(108, 99, 255, 0.1);
      border: 1px solid rgba(108, 99, 255, 0.3);
      border-radius: 10px;
      padding: 16px;
      font-size: 14px;
      color: #b8b8d0;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🎉</div>
    <h1>Welcome to Pro!</h1>
    <p>Your GamerLingo Pro subscription is now active.<br>Enjoy unlimited translations!</p>
    <div class="hint">
      Close this tab and reopen the GamerLingo popup to see your Pro status.
    </div>
  </div>
</body>
</html>
