<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GamerLingo — AI Game Translator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0f23, #1a1a3e);
      font-family: 'Segoe UI', -apple-system, Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }
    .card {
      text-align: center;
      max-width: 480px;
      padding: 48px 32px;
    }
    h1 { font-size: 36px; color: #6c63ff; margin-bottom: 12px; }
    p { color: #b8b8d0; line-height: 1.6; margin-bottom: 24px; }
    a {
      display: inline-block;
      background: #6c63ff;
      color: white;
      text-decoration: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 600;
    }
    a:hover { background: #5a52e0; }
    .links { margin-top: 24px; }
    .links a {
      background: none;
      color: #6c63ff;
      font-size: 14px;
      padding: 4px 8px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>GamerLingo</h1>
    <p>The AI translator that actually speaks gamer.<br>Works on Discord, Steam, and Twitch.</p>
    <a href="https://chromewebstore.google.com/">Get on Chrome Web Store</a>
    <div class="links">
      <a href="store/privacy-policy.html">Privacy Policy</a>
